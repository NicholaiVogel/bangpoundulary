name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  entries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python scripts/validate-entry.py
      - run: python scripts/build-index.py
      - run: git diff --exit-code dictionary/index.md
